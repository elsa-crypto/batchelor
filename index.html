<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>The BATCHelor · casting call</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Anton&family=Archivo+Black&family=Baloo+2:wght@800&family=Nunito:wght@900&family=Space+Mono:wght@400;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --page:#3D6BB4;
    --orange:#FF3EC8;
    --black:#14224A;
    --cream:#F1F5FC;
    --muted:#C9A6EF;
    --dark:#121212;
    --light:#F4F7FD;
  }
  *{box-sizing:border-box; margin:0; padding:0;}
  html,body{height:100%;}
  body{
    background:linear-gradient(180deg,#6E9BDD 0%,#4A78C0 45%,#35619F 100%);
    font-family:'Inter',system-ui,sans-serif;
    color:var(--light);
    display:flex; justify-content:center; align-items:center;
    -webkit-font-smoothing:antialiased;
    overflow:hidden;
  }
  @media(min-width:640px){ body{ padding:24px; } }

  .stage{
    position:relative;
    width:100%; max-width:430px;
    height:100dvh;
    overflow:hidden;
  }
  @media(min-width:640px){
    .stage{
      height:min(860px, calc(100dvh - 48px));
      border-radius:28px;
      box-shadow:0 30px 80px rgba(0,0,0,.5);
    }
  }

  .card{
    position:absolute; inset:0;
    padding:22px 22px 22px;
    display:flex; flex-direction:column;
    opacity:0; transform:translateY(24px);
    transition:opacity .2s ease, transform .2s ease;
    pointer-events:none;
    overflow:hidden;
  }
  .card.on{ opacity:1; transform:none; pointer-events:auto; }
  @media(min-width:640px){ .card{ border-radius:28px; } }
  @media(prefers-reduced-motion:reduce){
    .card{ transition:opacity .01s; }
    .card:not(.on){ transform:none; }
  }

  .card.bg-orange{ background:var(--orange); color:var(--dark); }
  .card.bg-black { background:var(--black);  color:var(--light); }
  .card.bg-cream { background:var(--cream);  color:var(--dark); }
  .card.bg-muted { background:var(--muted);  color:var(--dark); }

  .top{ display:flex; align-items:center; gap:10px; margin-bottom:16px; flex-shrink:0; }
  .back{
    background:none; border:none; color:inherit; cursor:pointer;
    font-family:'Space Mono',monospace; font-size:20px; line-height:1;
    padding:4px 6px; opacity:.75;
    visibility:hidden;
  }
  .back:hover{ opacity:1; }
  .card.hasback .back{ visibility:visible; }
  .wordmark{
    font-family:'Anton',sans-serif; font-size:15px;
    letter-spacing:1px;
    line-height:1; margin-left:auto;
  }
  .wordmark{ color:#FF6600; }
  .wordmark b{ color:#FF6600; font-weight:400; }
  .wordmark .x{
    display:inline-block; margin:0 6px;
    font-family:'Space Mono',monospace; font-size:12px;
    font-weight:400; letter-spacing:0; opacity:.6;
    vertical-align:middle; text-transform:none;
  }
  .ditto{
    height:32px; width:32px;
    border-radius:7px;
    vertical-align:middle;
    display:inline-block;
  }

  .progress{ display:flex; gap:3px; margin-bottom:22px; flex-shrink:0; }
  .progress i{
    flex:1; height:3px; border-radius:2px;
    background:currentColor; opacity:.14;
  }
  .progress i.f{ opacity:1; background:var(--orange); }
  .card.bg-orange .progress i.f, .card.bg-muted .progress i.f{ background:var(--dark); }
  .card.bg-cream  .progress i.f{ background:var(--orange); }

  .body{
    flex:1; display:flex; flex-direction:column; justify-content:center;
    min-height:0;
  }

  .question{
    font-family:'Anton',sans-serif; font-weight:400;
    text-transform:lowercase;
    text-align:center;
    line-height:.95; letter-spacing:.5px;
    transform:rotate(-2deg);
    font-size:clamp(44px, 11.5vw, 76px);
    padding:8px 4px;
    overflow-wrap:break-word;
    max-height:calc(0.95em * 5);
    overflow:hidden;
  }
  .question.long { font-size:clamp(32px, 8.5vw, 56px); }
  .question.xlong{ font-size:clamp(26px, 7vw, 44px); }
  .question.small{ font-size:clamp(28px, 6.5vw, 42px); padding:4px; max-height:none; }

  .subline{
    font-family:'Space Mono',monospace; font-size:12px;
    text-align:center; opacity:.72; margin-top:14px;
    line-height:1.55;
  }

  .fields{ margin-top:22px; display:flex; flex-direction:column; gap:16px; }
  .u-input, .u-textarea{
    background:none; border:none; border-bottom:1.5px solid currentColor;
    color:inherit; font-family:'Inter',sans-serif; font-weight:500;
    font-size:19px; padding:9px 2px; width:100%; outline:none;
    caret-color:var(--orange);
  }
  .u-textarea{ resize:none; font-size:17px; line-height:1.4; height:auto; overflow:hidden; }
  .u-input::placeholder, .u-textarea::placeholder{ color:currentColor; opacity:.42; }
  .card.bg-orange .u-input, .card.bg-orange .u-textarea,
  .card.bg-muted  .u-input, .card.bg-muted  .u-textarea{ caret-color:var(--dark); }
  .u-input:focus, .u-textarea:focus{ border-bottom-color:var(--orange); }
  .card.bg-orange .u-input:focus, .card.bg-orange .u-textarea:focus,
  .card.bg-muted  .u-input:focus, .card.bg-muted  .u-textarea:focus{ border-bottom-color:var(--dark); }

  .bottom{ margin-top:auto; padding-top:20px; margin-bottom:48px; flex-shrink:0; }
  .pills{
    width:85%; max-width:380px; margin:0 auto;
    display:grid; grid-template-columns:1fr; gap:12px;
  }
  .pills.two{ grid-template-columns:1fr 1fr; }
  .pill{
    background:var(--cream); color:var(--dark);
    border:none; border-radius:999px;
    font-family:'Inter',sans-serif; font-weight:600; font-size:17px;
    padding:18px 20px; cursor:pointer;
    width:100%;
    transition:transform .1s;
    letter-spacing:.1px;
  }
  .pill.sm{ padding:13px 16px; font-size:15.5px; }
  .pill:hover{ transform:translateY(-1px); }
  .pill:active{ transform:scale(.97); }
  .card.bg-cream .pill, .card.bg-muted .pill{ background:var(--dark); color:var(--cream); }
  .pill.selected{ background:var(--orange); color:var(--dark); }
  .card.bg-orange .pill.selected{ background:var(--dark); color:var(--orange); }
  .card.bg-cream .pill.selected, .card.bg-muted .pill.selected{ background:var(--orange); color:var(--cream); }

  .form-err{
    font-family:'Space Mono',monospace; font-size:12px; font-weight:700;
    text-align:center; margin-top:12px; min-height:1em;
    color:#D6244A;
  }
  .u-input.missing, .u-textarea.missing{ border-bottom-color:#D6244A !important; }

  .deck-count{
    font-family:'Space Mono',monospace; font-size:12px;
    text-align:center; opacity:.6; margin-top:14px; letter-spacing:1px;
  }
  .pointers{
    list-style:none; padding:0;
    margin:18px auto 0;
    width:100%; max-width:340px;
    display:flex; flex-direction:column; gap:6px;
  }
  .pointers li{
    font-family:'Inter',sans-serif; font-size:14.5px;
    font-weight:500; line-height:1.35;
    display:flex; gap:12px; align-items:baseline;
    padding:6px 0;
  }
  .pointers li .n{
    font-family:'Space Mono',monospace; font-size:11px;
    opacity:.55; letter-spacing:1px;
    flex-shrink:0; min-width:20px;
  }
  .word-count{
    font-family:'Space Mono',monospace; font-size:12px;
    text-align:center; opacity:.7; margin-top:10px; min-height:1em;
  }
  .word-count.over{ font-weight:700; opacity:1; color:var(--orange); }
  .card.bg-orange .word-count.over, .card.bg-muted .word-count.over{ color:var(--dark); }

  /* final screen */
  .done .body{ justify-content:center; align-items:center; text-align:center; gap:18px; }
  .heart{
    display:grid;
    grid-template-columns:repeat(11, 1fr);
    gap:2.5px; width:min(240px, 62%); aspect-ratio:11/10;
    margin:0 auto;
    filter:drop-shadow(0 6px 24px rgba(255,62,200,.45));
  }
  .heart span{ background:var(--orange); border-radius:2px; aspect-ratio:1; }
  .heart span.o{ background:transparent; }
  .done h2{
    font-family:'Anton',sans-serif; font-weight:400;
    font-size:clamp(42px, 11vw, 62px);
    text-transform:lowercase; line-height:.95;
    transform:rotate(-2deg);
    margin-top:8px;
  }
  .done p{
    font-family:'Aptos','Aptos Display','Segoe UI Variable',sans-serif;
    font-size:16px; font-weight:400;
    line-height:1.5; opacity:.9; max-width:320px;
  }

  /* 6/7 overlay */
  .sixseven{
    position:fixed; inset:0; display:none;
    align-items:center; justify-content:center;
    background:rgba(16,28,58,.86); z-index:9999; pointer-events:none;
  }
  .sixseven.on{ display:flex; }
  .sixseven .txt{
    font-family:'Anton',sans-serif;
    font-size:clamp(90px, 24vw, 260px);
    color:var(--orange);
    text-shadow:0 0 40px rgba(255,62,200,.55);
    letter-spacing:6px;
    display:flex; gap:.22em;
  }
  .sixseven .txt span{ display:inline-block; animation:bounce67 .55s ease-in-out infinite; }
  .sixseven .txt span:nth-child(2){ animation-delay:.14s; }
  .sixseven .hand{
    position:absolute; font-size:clamp(56px, 14vw, 140px);
    animation:handshake .28s ease-in-out infinite alternate;
  }
  .sixseven .hand.l{ left:8vw; }
  .sixseven .hand.r{ right:8vw; }
  .sixseven .cap{
    position:absolute; bottom:12vh;
    font-family:'Space Mono',monospace;
    font-size:16px; color:var(--light); opacity:.85;
    letter-spacing:2px;
  }
  @keyframes bounce67{ 0%,100%{transform:translateY(0) rotate(-2deg);} 50%{transform:translateY(-22px) rotate(3deg);} }
  @keyframes handshake{ from{transform:rotate(-16deg);} to{transform:rotate(16deg);} }
  @media(prefers-reduced-motion:reduce){
    .sixseven .txt span, .sixseven .hand{ animation:none; }
  }
</style>
</head>
<body>

<div class="stage" id="stage"></div>

<div class="sixseven" id="sixseven" aria-hidden="true">
  <div class="hand l">🤚</div>
  <div class="txt"><span>6</span><span>7</span></div>
  <div class="hand r">🤚</div>
  <div class="cap">six sevennnn</div>
</div>

<script>
const BGS = ['bg-orange','bg-black','bg-cream','bg-muted'];

const DECK = [
  {k:'like_someone', q:'you like someone. what do you do', a:'tell them',  b:'wait for them to notice'},
  {k:'fall_for',     q:'you fall for people who are',      a:'like you',   b:'nothing like you'},
  {k:'ex',           q:'are you over your ex',             a:'yes',        b:'yes.'},
  {k:'problem',      q:'are you the problem',              a:'no',         b:'historically'},
  {k:'body_count',   q:"what's your body count",           a:'nice try',   b:'my lawyer said no'},
  {k:'no_text_back', q:"if they don't text back you",      a:'move on',    b:'raise a round about it'},
  {k:'available',    q:'are you emotionally available',    a:'yes',        b:"I'm here aren't I"}
];

const VIDEO_PROMPTS = [
  "who you are (name, ig, age)",
  "who you're into",
  "the last time you were in front of a crowd",
  "how you handle getting roasted",
  "a text you should have never sent",
  "why you're single. actually.",
  "one dealbreaker + your moat",
  "your hot take on dating in SF",
  "your red flag",
  "a link that shows what you do"
];

const QS = [
  { type:'role', q:'watch or be watched',
    sub:'audience gets the show. participants get perceived.' },

  { type:'landing', q:'how do you want to submit',
    sub:'either way, same questions.' },

  { type:'text-multi', core:true, required:['name','instagram','age'], q:'who are you', inputs:[
      {key:'name',      placeholder:'name'},
      {key:'instagram', placeholder:'@instagram'},
      {key:'age',       placeholder:'age'} ] },

  { type:'video-brief', q:'cover these',
    sub:'~60 seconds. hit them in any order.',
    prompts: VIDEO_PROMPTS },

  { type:'type-page', q:"what's your type", key:'into',
    descKey:'type_description', placeholder:'describe your type\u2026' },

  { type:'multi-pill', q:'ever done anything in front of a crowd?',
    sub:'pick all that apply.',
    key:'crowd_experience',
    options:['performing','pitching','comedy','sports','debate','streaming','nothing yet'] },

  { type:'pills-2', q:'how do you feel about being roasted a little?',
    key:'roast_consent', a:'go easy', b:'do your worst' },

  { type:'textarea', q:'a text you should have never sent',
    key:'regretted_text', placeholder:"paste it. we won't tell." },

  { type:'textarea', q:'why are you single. actually.',
    key:'why_single', placeholder:'actually' },

  { type:'text-multi-q', inputs:[
      {key:'dealbreaker', q:'one dealbreaker. just one.', placeholder:'choose wisely'},
      {key:'moat',        q:"what's your moat",           placeholder:'why they fall'} ] },

  ...DECK.map((d, i) => ({ type:'deck-pill', q:d.q, k:d.k, a:d.a, b:d.b, deckIndex:i })),

  { type:'textarea', q:'hot take about dating in SF',
    key:'hot_take', placeholder:'say it with your chest' },

  { type:'text-single', q:"what's your red flag",
    key:'red_flag', placeholder:'the audience finds out either way' },

  { type:'text-single', q:'drop a link',
    sub:'linkedin, portfolio, github, resume. whatever shows what you do',
    key:'link', placeholder:'https://' },

  { type:'video-submit', q:'drop your video',
    sub:'60 seconds max. youtube, loom, drive, tiktok. whatever plays.',
    key:'video_link', placeholder:'https://' },

  { type:'contact', required:['phone','email'], q:'how do we reach you',
    sub:'phone for the txt. edu email required.',
    inputs:[
      {key:'phone', placeholder:'phone number', type:'tel'},
      {key:'email', placeholder:'edu email', type:'email'} ] },

  { type:'done' }
];

const TOTAL = QS.length;
const N_QS = TOTAL - 1;

const answers = {
  role:null,
  entry_choice:null,
  phone:'', email:'',
  name:'', instagram:'', age:'',
  into:null, type_description:'',
  crowd_experience:[],
  roast_consent:null,
  regretted_text:'',
  why_single:'',
  dealbreaker:'', moat:'',
  deck:{},
  hot_take:'', red_flag:'', link:'',
  video_link:''
};

let role = null; // 'audience' | 'participant'
let mode = null; // 'application' | 'video'
let ci = 0;
const stage = document.getElementById('stage');

function bgForQuestion(i){ return BGS[i % BGS.length]; }

function isSkipped(i){
  const q = QS[i];
  if (!q) return false;
  if (q.type === 'role' || q.type === 'done') return false;
  if (role === 'audience') return !(q.type === 'contact' || q.core);
  if (role !== 'participant') return true; // no role chosen yet
  if (q.type === 'landing' || q.type === 'contact') return false;
  if (mode === 'video') return !(q.type === 'video-brief' || q.type === 'video-submit' || q.core);
  if (mode === 'application') return q.type === 'video-brief' || q.type === 'video-submit';
  // participant but no submit method chosen yet
  return true;
}
function nextIdx(from){
  let i = from + 1;
  while (i < QS.length && isSkipped(i)) i++;
  return i < QS.length ? i : from;
}
function prevIdx(from){
  let i = from - 1;
  while (i >= 0 && isSkipped(i)) i--;
  return i >= 0 ? i : from;
}
function progressInfo(){
  const q = QS[ci];
  if (!q || q.type === 'landing' || q.type === 'role') return null;
  const flow = QS.map((qq, i) => i)
                 .filter(i => !isSkipped(i) && QS[i].type !== 'landing' && QS[i].type !== 'role' && QS[i].type !== 'done');
  const total = flow.length;
  const isDone = q.type === 'done';
  const filled = isDone ? total : (flow.indexOf(ci) + 1);
  return { total, filled };
}

function headerHtml(){
  const info = progressInfo();
  let bar = '';
  if (info){
    let s = '';
    for (let n = 0; n < info.total; n++) s += `<i class="${n < info.filled ? 'f':''}"></i>`;
    bar = `<div class="progress">${s}</div>`;

function pixelHeart(){
  const rows = [
    '.xxx...xxx.',
    'xxxxx.xxxxx',
    'xxxxxxxxxxx',
    'xxxxxxxxxxx',
    'xxxxxxxxxxx',
    '.xxxxxxxxx.',
    '..xxxxxxx..',
    '...xxxxx...',
    '....xxx....',
    '.....x.....'
  ];
  let out = '';
  rows.forEach(r => { for(const c of r){ out += `<span class="${c === 'x' ? '':'o'}"></span>`; } });
  return `<div class="heart" aria-hidden="true">${out}</div>`;
}

function qSizeClass(text){
  const n = (text || '').length;
  if (n > 40) return 'xlong';
  if (n > 28) return 'long';
  return '';
}

function render(){
  const q = QS[ci];
  const isDone = q.type === 'done';
  const bg = isDone ? 'bg-black' : (q.type === 'role' ? 'bg-cream' : bgForQuestion(ci));
  const hasBack = ci > 0;

  const card = document.createElement('div');
  card.className = `card ${bg} ${hasBack ? 'hasback':''} ${isDone ? 'done':''}`;

  const qCls = qSizeClass(q.q);
  let bodyHtml = '';
  let bottomHtml = '';

  switch(q.type){
    case 'role': {
      const sel = answers.role;
      bodyHtml = `
        <div class="question ${qCls}">${q.q}</div>
        ${q.sub ? `<div class="subline">${q.sub}</div>` : ''}
      `;
      bottomHtml = `
        <div class="pills two">
          <button class="pill ${sel==='audience'?'selected':''}" data-role="audience">audience</button>
          <button class="pill ${sel==='participant'?'selected':''}" data-role="participant">participant</button>
        </div>
      `;
      break;
    }
    case 'landing': {
      const sel = answers.entry_choice;
      bodyHtml = `
        <div class="question ${qCls}">${q.q}</div>
        ${q.sub ? `<div class="subline">${q.sub}</div>` : ''}
      `;
      bottomHtml = `
        <div class="pills two">
          <button class="pill ${sel==='application'?'selected':''}" data-landing="application">do the application</button>
          <button class="pill ${sel==='video'?'selected':''}" data-landing="video">make a video</button>
        </div>
      `;
      break;
    }
    case 'video-brief': {
      const list = q.prompts.map((p, i) =>
        `<li><span class="n">${String(i+1).padStart(2,'0')}</span><span>${p}</span></li>`
      ).join('');
      bodyHtml = `
        ${q.sub ? `<div class="subline">${q.sub}</div>` : ''}
        <ol class="pointers">${list}</ol>
      `;
      bottomHtml = `<div class="pills"><button class="pill" data-next>okay, ready \u2192</button></div>`;
      break;
    }
    case 'video-submit': {
      bodyHtml = `
        <div class="question ${qCls}">${q.q}</div>
        ${q.sub ? `<div class="subline">${q.sub}</div>` : ''}
        <div class="fields">
          <input class="u-input" data-key="${q.key}" placeholder="${escAttr(q.placeholder)}" value="${escAttr(answers[q.key]||'')}" autocomplete="off">
        </div>
      `;
      bottomHtml = `<div class="pills"><button class="pill" data-next>next \u2192</button></div>`;
      break;
    }
    case 'text-multi': {
      const inputs = q.inputs.map(inp =>
        `<input class="u-input" data-key="${inp.key}" placeholder="${escAttr(inp.placeholder)}" value="${escAttr(answers[inp.key]||'')}" autocomplete="off">`
      ).join('');
      bodyHtml = `<div class="question ${qCls}">${q.q}</div><div class="fields">${inputs}</div><div class="form-err"></div>`;
      bottomHtml = `<div class="pills"><button class="pill" data-next>next \u2192</button></div>`;
      break;
    }
    case 'text-multi-q': {
      bodyHtml = q.inputs.map((inp, idx) => `
        <div style="margin-top:${idx?24:0}px;">
          <div class="question small">${inp.q}</div>
          <div class="fields" style="margin-top:14px;">
            <input class="u-input" data-key="${inp.key}" placeholder="${escAttr(inp.placeholder)}" value="${escAttr(answers[inp.key]||'')}" autocomplete="off">
          </div>
        </div>
      `).join('');
      bottomHtml = `<div class="pills"><button class="pill" data-next>next \u2192</button></div>`;
      break;
    }
    case 'type-page': {
      const sel = answers[q.key];
      bodyHtml = `
        <div class="question ${qCls}">${q.q}</div>
        <div class="pills two" style="margin-top:24px;">
          <button class="pill ${sel==='men'?'selected':''}" data-type-pick="men">men</button>
          <button class="pill ${sel==='women'?'selected':''}" data-type-pick="women">women</button>
        </div>
        <div class="fields">
          <textarea class="u-textarea" rows="1" data-key="${q.descKey}" placeholder="${escAttr(q.placeholder)}">${escHtml(answers[q.descKey]||'')}</textarea>
        </div>
      `;
      bottomHtml = `<div class="pills"><button class="pill" data-next>next \u2192</button></div>`;
      break;
    }
    case 'textarea': {
      bodyHtml = `
        <div class="question ${qCls}">${q.q}</div>
        ${q.sub ? `<div class="subline">${q.sub}</div>` : ''}
        <div class="fields">
          <textarea class="u-textarea" rows="1" data-key="${q.key}" placeholder="${escAttr(q.placeholder)}">${escHtml(answers[q.key]||'')}</textarea>
        </div>
      `;
      bottomHtml = `<div class="pills"><button class="pill" data-next>next \u2192</button></div>`;
      break;
    }
    case 'text-single': {
      const isLast = QS[nextIdx(ci)]?.type === 'done';
      bodyHtml = `
        <div class="question ${qCls}">${q.q}</div>
        ${q.sub ? `<div class="subline">${q.sub}</div>` : ''}
        <div class="fields">
          <input class="u-input" data-key="${q.key}" placeholder="${escAttr(q.placeholder)}" value="${escAttr(answers[q.key]||'')}" autocomplete="off">
        </div>
      `;
      bottomHtml = `<div class="pills"><button class="pill" data-next>${isLast ? 'submit' : 'next \u2192'}</button></div>`;
      break;
    }
    case 'input-3w': {
      bodyHtml = `
        <div class="question ${qCls}">${q.q}</div>
        <div class="fields">
          <input class="u-input" data-key="${q.key}" placeholder="${escAttr(q.placeholder)}" value="${escAttr(answers[q.key]||'')}" autocomplete="off">
        </div>
        <div class="word-count" id="wc"></div>
      `;
      bottomHtml = `<div class="pills"><button class="pill" data-next>next \u2192</button></div>`;
      break;
    }
    case 'multi-pill': {
      const sel = answers[q.key] || [];
      const opts = q.options.map(o =>
        `<button class="pill sm ${sel.includes(o)?'selected':''}" data-multi-pick="${escAttr(o)}">${o}</button>`
      ).join('');
      bodyHtml = `
        <div class="question small">${q.q}</div>
        ${q.sub ? `<div class="subline">${q.sub}</div>` : ''}
        <div class="pills two" style="margin-top:20px; gap:10px;">${opts}</div>
      `;
      bottomHtml = `<div class="pills"><button class="pill" data-next>next \u2192</button></div>`;
      break;
    }
    case 'pills-2': {
      const sel = answers[q.key];
      bodyHtml = `<div class="question ${qCls}">${q.q}</div>`;
      bottomHtml = `
        <div class="pills two">
          <button class="pill ${sel===q.a?'selected':''}" data-pick="${escAttr(q.a)}">${q.a}</button>
          <button class="pill ${sel===q.b?'selected':''}" data-pick="${escAttr(q.b)}">${q.b}</button>
        </div>
      `;
      break;
    }
    case 'deck-pill': {
      const sel = answers.deck[q.k];
      bodyHtml = `<div class="question ${qCls}">${q.q}</div>`;
      bottomHtml = `
        <div class="pills two">
          <button class="pill ${sel===q.a?'selected':''}" data-deck-pick="${escAttr(q.a)}">${q.a}</button>
          <button class="pill ${sel===q.b?'selected':''}" data-deck-pick="${escAttr(q.b)}">${q.b}</button>
        </div>
        <div class="deck-count">${q.deckIndex+1} / ${DECK.length}</div>
      `;
      break;
    }
    case 'contact': {
      const isLast = QS[nextIdx(ci)]?.type === 'done';
      const inputs = q.inputs.map(inp =>
        `<input class="u-input" type="${inp.type}" data-key="${inp.key}" placeholder="${escAttr(inp.placeholder)}" value="${escAttr(answers[inp.key]||'')}" autocomplete="off">`
      ).join('');
      bodyHtml = `
        <div class="question ${qCls}">${q.q}</div>
        ${q.sub ? `<div class="subline">${q.sub}</div>` : ''}
        <div class="fields">${inputs}</div>
        <div class="form-err"></div>
      `;
      bottomHtml = `<div class="pills"><button class="pill" data-next>${isLast ? 'submit' : 'next \u2192'}</button></div>`;
      break;
    }
    case 'done': {
      const isAud = role === 'audience';
      bodyHtml = `
        ${pixelHeart()}
        <h2>${isAud ? "you're on the list" : 'application in review'}</h2>
        <p>${isAud ? "we'll txt you the where + when." : "8 spots. 200 in the audience. we'll txt you if you get in."}</p>
      `;
      break;
    }
  }

  card.innerHTML = `
    ${headerHtml()}
    <div class="body">${bodyHtml}</div>
    <div class="bottom">${bottomHtml}</div>
  `;

  const prev = stage.querySelector('.card.on');
  if (prev) {
    prev.classList.remove('on');
    const old = prev;
    setTimeout(() => { if (old.parentNode) old.parentNode.removeChild(old); }, 240);
  }
  stage.appendChild(card);
  requestAnimationFrame(() => card.classList.add('on'));

  wire(card, q);
}

function wire(card, q){
  card.querySelector('.back').onclick = () => {
    const p = prevIdx(ci);
    if (p < ci){ ci = p; render(); }
  };

  card.querySelectorAll('[data-key]').forEach(el => {
    el.addEventListener('input', () => {
      answers[el.dataset.key] = el.value;
      el.classList.remove('missing');
      const err = card.querySelector('.form-err');
      if (err) err.textContent = '';
    });
  });

  card.querySelectorAll('.u-textarea').forEach(t => {
    const fit = () => {
      if (!t.value){ t.style.height = ''; return; }
      t.style.height = 'auto';
      t.style.height = t.scrollHeight + 'px';
    };
    t.addEventListener('input', fit);
    requestAnimationFrame(fit);
  });

  const nx = card.querySelector('[data-next]');
  if (nx) nx.onclick = () => advance();

  card.querySelectorAll('[data-role]').forEach(b => {
    b.onclick = () => {
      role = b.dataset.role;
      answers.role = role;
      advance();
    };
  });

  card.querySelectorAll('[data-landing]').forEach(b => {
    b.onclick = () => {
      mode = b.dataset.landing;
      answers.entry_choice = mode;
      advance();
    };
  });

  card.querySelectorAll('[data-type-pick]').forEach(b => {
    b.onclick = () => {
      answers[q.key] = b.dataset.typePick;
      card.querySelectorAll('[data-type-pick]').forEach(x => x.classList.toggle('selected', x === b));
    };
  });

  card.querySelectorAll('[data-multi-pick]').forEach(b => {
    b.onclick = () => {
      const v = b.dataset.multiPick;
      const arr = answers[q.key];
      const i = arr.indexOf(v);
      if (i >= 0) arr.splice(i, 1); else arr.push(v);
      b.classList.toggle('selected', i < 0);
    };
  });

  card.querySelectorAll('[data-pick]').forEach(b => {
    b.onclick = () => { answers[q.key] = b.dataset.pick; advance(); };
  });
  card.querySelectorAll('[data-deck-pick]').forEach(b => {
    b.onclick = () => { answers.deck[q.k] = b.dataset.deckPick; advance(); };
  });

  const first = card.querySelector('.u-input, .u-textarea');
  if (first && window.matchMedia('(min-width:640px)').matches){
    setTimeout(() => first.focus({preventScroll:true}), 260);
  }
}

function updateWordCount(v){
  const wc = document.getElementById('wc');
  if (!wc) return;
  const n = (v.trim().match(/\S+/g) || []).length;
  wc.classList.remove('over');
  if (n === 0) wc.textContent = '';
  else if (n > 3){ wc.textContent = 'we said three.'; wc.classList.add('over'); }
  else if (n === 3) wc.textContent = 'perfect.';
  else wc.textContent = n + ' word' + (n===1?'':'s');
}

function validateCurrent(){
  const q = QS[ci];
  const cards = stage.querySelectorAll('.card');
  const card = cards[cards.length - 1];
  const fail = (msg, keys) => {
    if (card){
      const err = card.querySelector('.form-err');
      if (err) err.textContent = msg;
      card.querySelectorAll('[data-key]').forEach(el =>
        el.classList.toggle('missing', keys.includes(el.dataset.key)));
    }
    return false;
  };
  if (q.required){
    const missing = q.required.filter(k => !String(answers[k]||'').trim());
    if (missing.length) return fail('all fields required.', missing);
  }
  if (q.type === 'contact' && !String(answers.email||'').includes('@')){
    return fail("that's not an email.", ['email']);
  }
  return true;
}

function advance(){
  if (!validateCurrent()) return;
  const next = nextIdx(ci);
  const nextQ = QS[next];
  if (nextQ && nextQ.type === 'deck-pill' && nextQ.deckIndex === 5) triggerSixSeven();
  if (next > ci){ ci = next; render(); if (QS[ci].type === 'done') buildPayload(); }
}

function buildPayload(){
  const base = {
    role: answers.role,
    entry_choice: answers.entry_choice,
    name: answers.name,
    instagram: answers.instagram,
    age: answers.age,
    phone: answers.phone,
    email: answers.email,
    ts: new Date().toISOString()
  };
  if (answers.role === 'audience') return base;
  if (answers.entry_choice === 'video'){
    return { ...base, video_link: answers.video_link };
  }
  return {
    ...base,
    into: answers.into,
    type_description: answers.type_description,
    crowd_experience: answers.crowd_experience.join(', '),
    roast_consent: answers.roast_consent,
    regretted_text: answers.regretted_text,
    why_single: answers.why_single,
    dealbreaker: answers.dealbreaker,
    moat: answers.moat,
    deck: answers.deck,
    hot_take: answers.hot_take,
    red_flag: answers.red_flag,
    link: answers.link
  };
}

function escAttr(s){ return String(s).replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;'); }
function escHtml(s){ return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

let sixSevenTimer = null;
function triggerSixSeven(){
  const el = document.getElementById('sixseven');
  el.classList.add('on');
  clearTimeout(sixSevenTimer);
  sixSevenTimer = setTimeout(() => el.classList.remove('on'), 1500);
}

document.addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey){
    const nx = document.querySelector('.card.on [data-next]');
    if (nx){ e.preventDefault(); nx.click(); }
  }
});

render();
</script>
